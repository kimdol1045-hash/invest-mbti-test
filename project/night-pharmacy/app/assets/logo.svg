<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#3182F6"/>
  <!-- Pharmacy cross - balanced proportions -->
  <rect x="220" y="100" width="160" height="340" rx="28" fill="white"/>
  <rect x="150" y="190" width="300" height="160" rx="28" fill="white"/>
  <!-- Clock circle -->
  <circle cx="430" cy="430" r="100" fill="white"/>
  <circle cx="430" cy="430" r="84" fill="#3182F6"/>
  <circle cx="430" cy="430" r="76" fill="white"/>
  <!-- Clock hands -->
  <line x1="430" y1="430" x2="430" y2="385" stroke="#191F28" stroke-width="8" stroke-linecap="round"/>
  <line x1="430" y1="430" x2="462" y2="445" stroke="#3182F6" stroke-width="6" stroke-linecap="round"/>
  <!-- Clock center dot -->
  <circle cx="430" cy="430" r="6" fill="#191F28"/>
</svg>
